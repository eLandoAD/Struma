<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Consultant - pubblica video</title>
</head>
<body>
<h1>Consultant (pubblica video)</h1>
<video id="remoteVideo" autoplay playsinline width="400" style="border: 2px solid red; background: #333;"></video>
<pre id="log"></pre>

<script>
const log = (msg) => {
  document.getElementById('log').textContent += msg + "\n";
  console.log(msg);
};

const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/signal';

const ws = new WebSocket(wsUrl);
let pc;

function send(obj) {
  ws.send(JSON.stringify(obj));
}

async function start() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      send({ type: 'ice_candidate', candidate: event.candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    log('stato connessione: ' + pc.connectionState);
  };

  // Solo video per ora — l'audio lo aggiungiamo quando costruiamo
  // il flusso reale (è two-way, qui vogliamo solo provare la parte one-way).
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById('localVideo').srcObject = stream;
  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  send({ type: 'offer', sdp: offer });
  log('offer inviata');
}

ws.onopen = () => {
  log('connesso al server');
  start().catch(e => log('errore start(): ' + e));
};

ws.onmessage = async (event) => {
  const msg = JSON.parse(event.data);
  if (msg.type === 'answer') {
    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    log('answer ricevuta');
  } else if (msg.type === 'ice_candidate') {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    } catch (e) {
      log('errore ICE candidate: ' + e);
    }
  }
};

ws.onerror = (e) => log('errore websocket: ' + e);
</script>
</body>
</html>
